name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # Test job runs on all platforms
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Run Tests
      run: go test -v -race ./...

    - name: Check Test Coverage
      if: matrix.os == 'ubuntu-latest'
      run: |
        go test -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out | tail -1

  # Lint job runs only on Linux
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true  # Allow lint to report issues without blocking build
    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
        args: --timeout=5m

  # Build job runs after test, only on tag push
  build:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            ext: .exe
            artifact_name: gomailtesttool-windows-amd64
            goarch: amd64
          - os: ubuntu-latest
            ext: ''
            artifact_name: gomailtesttool-linux-amd64
            goarch: amd64
          - os: macos-latest
            ext: ''
            artifact_name: gomailtesttool-macos-arm64
            goarch: arm64

    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build gomailtest (smtp+pop3+imap+jmap)
      env:
        GOARCH: ${{ matrix.goarch }}
      run: |
        go build -tags "custom,smtp,pop3,imap,jmap" -ldflags="-s -w" -o bin/gomailtest${{ matrix.ext }} ./cmd/gomailtest

    - name: Build gomailtest-exchange (ews+msgraph)
      env:
        GOARCH: ${{ matrix.goarch }}
      run: |
        go build -tags "custom,ews,msgraph" -ldflags="-s -w" -o bin/gomailtest-exchange${{ matrix.ext }} ./cmd/gomailtest

    - name: Build gomailtest-gmail (gmail)
      env:
        GOARCH: ${{ matrix.goarch }}
      run: |
        go build -tags "custom,gmail" -ldflags="-s -w" -o bin/gomailtest-gmail${{ matrix.ext }} ./cmd/gomailtest

    - name: Set ZIP name
      shell: bash
      run: echo "ZIP_NAME=${{ matrix.artifact_name }}-${{ github.ref_name }}.zip" >> "$GITHUB_ENV"

    - name: Verify build outputs (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        foreach ($binary in @("bin\gomailtest${{ matrix.ext }}", "bin\gomailtest-exchange${{ matrix.ext }}", "bin\gomailtest-gmail${{ matrix.ext }}")) {
          if (Test-Path $binary) {
            Write-Host "✓ $binary build successful"
            Get-Item $binary | Select-Object Name, Length
          } else {
            Write-Error "✗ $binary build failed"
            exit 1
          }
        }

    - name: Verify build outputs (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        for binary in bin/gomailtest bin/gomailtest-exchange bin/gomailtest-gmail; do
          if [ -f "${binary}${{ matrix.ext }}" ]; then
            echo "✓ ${binary} build successful"
            ls -lh "${binary}${{ matrix.ext }}"
          else
            echo "✗ ${binary} build failed"
            exit 1
          fi
        done

    - name: Create ZIP archive (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Compress-Archive -Path bin\gomailtest${{ matrix.ext }},bin\gomailtest-exchange${{ matrix.ext }},bin\gomailtest-gmail${{ matrix.ext }},README.md,TOOLS.md,LICENSE -DestinationPath $env:ZIP_NAME
        Write-Host "Created ZIP archive: $env:ZIP_NAME"
        Get-Item $env:ZIP_NAME | Select-Object Name, Length

    - name: Create ZIP archive (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        zip $ZIP_NAME bin/gomailtest bin/gomailtest-exchange bin/gomailtest-gmail README.md TOOLS.md LICENSE
        echo "Created ZIP archive: $ZIP_NAME"
        ls -lh $ZIP_NAME

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ env.ZIP_NAME }}

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ env.ZIP_NAME }}
        body: |
          ## gomailtesttool Suite v4.0 - Email Infrastructure Testing Tools

          Portable CLI tools for comprehensive email infrastructure testing, now split into focused binaries.

          ### What's Included

          Each ZIP archive contains three separate binaries:
          - **gomailtest** - Standard protocols (smtp, imap, pop3, jmap)
          - **gomailtest-exchange** - Microsoft/Exchange protocols (ews, msgraph)
          - **gomailtest-gmail** - Gmail / Google Workspace

          Plus documentation:
          - **README.md** - Main documentation
          - **TOOLS.md** - Protocol-specific tool guides
          - **LICENSE** - MIT License

          ### Installation

          **Windows (amd64):**
          1. Download `gomailtesttool-windows-amd64-${{ github.ref_name }}.zip`
          2. Extract the ZIP file
          3. Run e.g.: `gomailtest.exe --help`

          **Linux (amd64):**
          1. Download `gomailtesttool-linux-amd64-${{ github.ref_name }}.zip`
          2. Extract: `unzip gomailtesttool-linux-amd64-${{ github.ref_name }}.zip`
          3. Make executables: `chmod +x gomailtest gomailtest-exchange gomailtest-gmail`
          4. Run e.g.: `./gomailtest --help`

          **macOS (Apple Silicon/arm64):**
          1. Download `gomailtesttool-macos-arm64-${{ github.ref_name }}.zip`
          2. Extract: `unzip gomailtesttool-macos-arm64-${{ github.ref_name }}.zip`
          3. Make executables: `chmod +x gomailtest gomailtest-exchange gomailtest-gmail`
          4. Run e.g.: `./gomailtest --help`

          **Note for macOS:** If you see "cannot be opened because the developer cannot be verified":
          - Right-click the binary and select "Open", or
          - Run: `xattr -d com.apple.quarantine gomailtest gomailtest-exchange gomailtest-gmail`

          ### Quick Start Examples

          **SMTP Testing:**
          ```bash
          ./gomailtest smtp testconnect --host smtp.example.com --port 25
          ./gomailtest smtp teststarttls --host smtp.example.com --port 587
          ```

          **IMAP Testing:**
          ```bash
          ./gomailtest imap testconnect --host imap.example.com --imaps
          ./gomailtest imap listfolders --host imap.example.com --imaps \
            --username user@example.com --accesstoken "ya29..."
          ```

          **POP3 Testing:**
          ```bash
          ./gomailtest pop3 testconnect --host pop.example.com --pop3s
          ./gomailtest pop3 listmail --host pop.example.com --pop3s \
            --username user@example.com --password "app-password"
          ```

          **JMAP Testing:**
          ```bash
          ./gomailtest jmap testconnect --host jmap.fastmail.com
          ./gomailtest jmap getmailboxes --host jmap.fastmail.com \
            --username user@fastmail.com --accesstoken "token"
          ```

          **EWS / Microsoft Graph:**
          ```bash
          ./gomailtest-exchange ews testconnect --host mail.example.com
          ./gomailtest-exchange msgraph getinbox --tenantid "..." --clientid "..." --secret "..." \
            --mailbox "user@example.com"
          ```

          **Gmail / Google Workspace:**
          ```bash
          ./gomailtest-gmail gmail listmessages --credentials credentials.json \
            --mailbox user@gmail.com
          ```

          ### Documentation
          - Online: [GitHub Repository](https://github.com/${{ github.repository }})
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
